{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - AI Education</title>
    <style>
      /* ================= BODY & BACKGROUND ================= */
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #667eea, #764ba2);
      }

      /* ================= CARD ================= */
      .card {
        background: #ffffff;
        padding: 40px 30px 30px 30px;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
        width: 350px;
        text-align: center;
        overflow: hidden;
        position: relative;
      }

      /* Logo container */
      .logo-container {
        width: 120px;
        height: 120px;
        margin: 0 auto;
        border-radius: 50%;
        overflow: hidden;
        border: 4px solid #fff;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        background: #fff;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .logo-container img {
        width: 100%;
        height: 100%;
      }

      .fallback-text {
        display: none;
        font-weight: bold;
        color: #333;
        text-align: center;
      }

      .logo-container.fallback .fallback-text {
        display: block;
      }

      /* ================= HEADING ================= */
      .card h2 {
        margin-top: 20px;
        margin-bottom: 25px;
        color: #333333;
        font-size: 28px;
        font-weight: 600;
      }

      /* ================= INPUT FIELDS ================= */
      .card input {
        width: 100%;
        box-sizing: border-box;
        padding: 12px 15px;
        margin: 10px 0 20px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .card input:focus {
        border-color: #667eea;
        box-shadow: 0 0 5px rgba(102, 126, 234, 0.5);
        outline: none;
      }

      /* ================= BUTTON ================= */
      .card button {
        width: 100%;
        padding: 12px;
        background: #667eea;
        color: #fff;
        font-size: 16px;
        font-weight: 600;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.3s ease;
      }

      .card button:hover {
        background: #5a67d8;
      }

      /* ================= MESSAGES ================= */
      .messages {
        margin-top: 15px;
      }

      .messages p {
        color: red;
        font-size: 14px;
        margin: 5px 0 0 0;
      }

      /* ================= RESPONSIVE ================= */
      @media (max-width: 400px) {
        .card {
          width: 90%;
          padding: 40px 20px 30px 20px;
        }

        .logo-container {
          width: 100px;
          height: 100px;
          margin-top: -50px;
        }

        .card h2 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <!-- Logo -->
      <div class="logo-container">
        <img src="{% static 'images/logo.jpg' %}" alt="School Logo" />
      </div>

      <h2>Login</h2>

      <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Username" required />
        <input
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button type="submit">Login</button>
      </form>

      {% if messages %}
      <div class="messages">
        {% for message in messages %}
        <p>{{ message }}</p>
        {% endfor %}
      </div>
      {% endif %}
    </div>
  </body>
</html>
