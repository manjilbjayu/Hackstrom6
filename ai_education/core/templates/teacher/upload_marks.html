{% extends 'base.html' %}
{% block title %}Upload Marks{% endblock %}

{% block content %}
<h3 class="mb-4 text-center">Upload Marks via Excel</h3>

<form method="POST" enctype="multipart/form-data" class="card p-4 shadow-sm">
    {% csrf_token %}

    <!-- Class/Section Selection -->
    <div class="mb-3">
        <label for="class_section" class="form-label">Class/Section</label>
        <select id="class_section" name="class_section" class="form-select" required>
            <option value="" selected disabled>Select Class Section</option>
            {% for sec in sections %}
            <option value="{{ sec.id }}">{{ sec.name }} - Section {{ sec.semester }}</option>
            {% endfor %}
        </select>
    </div>

    <!-- Excel File Upload -->
    <div class="mb-3">
        <label for="file" class="form-label">Excel File</label>
        <input type="file" id="file" name="file" class="form-control" accept=".xls,.xlsx" required>
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn btn-primary w-100">Upload</button>
</form>
{% endblock %}
